<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Medical Chatbot</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background: #1a73e8;
            color: white;
            padding: 16px 24px;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header span { font-size: 1.4rem; }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .user {
            align-self: flex-end;
            background: #1a73e8;
            color: white;
            border-bottom-right-radius: 2px;
        }

        .bot {
            align-self: flex-start;
            background: white;
            color: #333;
            border-bottom-left-radius: 2px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }

        .bot .label {
            font-size: 0.75rem;
            color: #1a73e8;
            font-weight: 600;
            margin-bottom: 4px;
        }

        #input-area {
            display: flex;
            padding: 16px 24px;
            background: white;
            border-top: 1px solid #ddd;
            gap: 12px;
        }

        #user-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 0.95rem;
            outline: none;
            resize: none;
        }

        #user-input:focus { border-color: #1a73e8; }

        #send-btn {
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 50%;
            width: 46px;
            height: 46px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #send-btn:hover { background: #1558b0; }

        .typing {
            align-self: flex-start;
            color: #888;
            font-size: 0.85rem;
            font-style: italic;
        }
    </style>
</head>
<body>

<header>
    <span>🩺</span> Medical RAG Chatbot
</header>

<div id="chat-container">
    <div class="message bot">
        <div class="label">Assistant</div>
        Hello! I am your medical assistant. Ask me any medical question.
    </div>
</div>

<div id="input-area">
    <input
        type="text"
        id="user-input"
        placeholder="Ask a medical question..."
        autocomplete="off"
    />
    <button id="send-btn" onclick="sendMessage()">&#9658;</button>
</div>

<script>
    const chatContainer = document.getElementById("chat-container");
    const userInput = document.getElementById("user-input");

    userInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMessage();
    });

    function appendMessage(text, role) {
        const div = document.createElement("div");
        div.classList.add("message", role);
        if (role === "bot") {
            div.innerHTML = `<div class="label">Assistant</div>${text}`;
        } else {
            div.textContent = text;
        }
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function showTyping() {
        const div = document.createElement("div");
        div.classList.add("typing");
        div.id = "typing";
        div.textContent = "Assistant is typing...";
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function removeTyping() {
        const t = document.getElementById("typing");
        if (t) t.remove();
    }

    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;

        appendMessage(message, "user");
        userInput.value = "";
        showTyping();

        try {
            const response = await fetch("/get", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message })
            });
            const data = await response.json();
            removeTyping();
            appendMessage(data.response, "bot");
        } catch (err) {
            removeTyping();
            appendMessage("An error occurred. Please try again.", "bot");
        }
    }
</script>

</body>
</html>
